<style>

  /* Product card image area */
  .product-img-placeholder {
    width: 100%;
    height: 220px;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    border-radius: 10px 10px 0 0;
  }
  .product-img-placeholder svg {
    width: 100%;
    height: 100%;
  }

  /* WhatsApp button */
  .btn-whatsapp {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    width: calc(100% - 32px);
    margin: 12px 16px 16px;
    padding: 14px;
    background: #25D366;
    color: #fff;
    font-size: 15px;
    font-weight: 600;
    border: none;
    border-radius: 12px;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s;
    letter-spacing: 0.2px;
  }
  .btn-whatsapp:hover  { background: #1da851; }
  .btn-whatsapp:active { transform: scale(0.98); }
  .btn-whatsapp svg { flex-shrink: 0; }

  /* Cart items rendered list */
  #cartItemsList { padding: 0 16px; max-height: 320px; overflow-y: auto; }
  .cart-line {
    display: flex; justify-content: space-between; align-items: center;
    padding: 10px 0; border-bottom: 1px solid #f0e8e8;
    font-size: 13px;
  }
  .cart-line:last-child { border-bottom: none; }
  .cart-line-name { font-weight: 600; color: #333; font-size: 13px; }
  .cart-line-sub  { color: #999; font-size: 12px; margin-top: 2px; }
  .cart-line-price { font-weight: 700; color: #c0392b; white-space: nowrap; }
  .cart-line-remove {
    background: #fee; color: #c0392b; border: none;
    border-radius: 50%; width: 22px; height: 22px;
    cursor: pointer; font-size: 13px; line-height: 1;
    margin-left: 8px; flex-shrink: 0;
  }
  .cart-total-row {
    display: flex; justify-content: space-between;
    padding: 12px 16px 0; font-weight: 700; font-size: 15px;
    border-top: 2px solid #f5e8e8; margin-top: 4px;
  }

  /* Demo grid below */
  body { font-family: 'Segoe UI', sans-serif; background: #fdf8f5; margin: 0; padding: 20px; }
  h2 { text-align: center; color: #7a3535; margin-bottom: 8px; }
  .note { text-align: center; color: #999; font-size: 13px; margin-bottom: 24px; }
  .products-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 20px; max-width: 1100px; margin: 0 auto 40px;
  }
  .product-card {
    background: #fff; border-radius: 12px;
    box-shadow: 0 2px 12px rgba(0,0,0,0.08);
    overflow: hidden; transition: transform 0.2s, box-shadow 0.2s;
    position: relative;
  }
  .product-card:hover { transform: translateY(-4px); box-shadow: 0 8px 24px rgba(0,0,0,0.12); }
  .product-img-wrap { position: relative; }
  .product-badge {
    position: absolute; top: 10px; left: 10px; z-index: 2;
    padding: 3px 10px; border-radius: 20px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .badge-new        { background: #e8f5e9; color: #2e7d32; }
  .badge-bestseller { background: #fff3e0; color: #e65100; }
  .badge-sale       { background: #fce4ec; color: #c62828; }
  .product-wishlist {
    position: absolute; top: 10px; right: 10px; z-index: 2;
    background: rgba(255,255,255,0.9); border: none; border-radius: 50%;
    width: 32px; height: 32px; font-size: 16px; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    box-shadow: 0 1px 4px rgba(0,0,0,0.15);
  }
  .product-info { padding: 12px 14px 6px; }
  .product-name { font-size: 14px; font-weight: 600; color: #333; margin: 0 0 4px; }
  .product-price { font-size: 15px; font-weight: 700; color: #c0392b; margin: 0 0 10px; }
  .product-quick-add {
    display: block; width: calc(100% - 28px); margin: 0 14px 14px;
    padding: 9px; background: #7a3535; color: #fff;
    border: none; border-radius: 8px; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: background 0.2s;
  }
  .product-quick-add:hover { background: #5c2323; }

  /* Toast */
  #toast {
    position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: #333; color: #fff; padding: 10px 20px; border-radius: 30px;
    font-size: 14px; opacity: 0; transition: opacity 0.3s, transform 0.3s;
    pointer-events: none; z-index: 9999; white-space: nowrap;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* Mini cart panel demo */
  .cart-panel-demo {

    background: #fff; border-radius: 16px;
    box-shadow: 0 4px 24px rgba(0,0,0,0.12); overflow: hidden;

    background: #7a3535; color: #fff;

    font-size: 13px; font-weight: 700;
    display: flex; align-items: center; justify-content: center;
  }

// ── CART STATE ──
let cart = JSON.parse(localStorage.getItem('lc_cart') || '[]');
function saveCart() { localStorage.setItem('lc_cart', JSON.stringify(cart)); }
function getCartCount() { return cart.reduce((sum, i) => sum + i.qty, 0); }

// ── CART UI UPDATE ──
function updateCartUI() {
  const countEl   = document.getElementById('cartCount');
  const listEl    = document.getElementById('cartItemsList');
  const totalEl   = document.getElementById('cartTotal');
  const totalRow  = document.getElementById('cartTotalRow');
  const waBtn     = document.getElementById('whatsappBtn');
  const emptyMsg  = document.getElementById('cartEmptyMsg');

  if (countEl) countEl.textContent = getCartCount();

  if (listEl) {
    if (cart.length === 0) {
      listEl.innerHTML = '';
      if (emptyMsg) emptyMsg.style.display = 'block';
      if (totalRow) totalRow.style.display = 'none';
      if (waBtn)    waBtn.style.display    = 'none';
    } else {
      if (emptyMsg) emptyMsg.style.display = 'none';
      const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
      listEl.innerHTML = cart.map(item => `
        <div class="cart-line">
          <div>
            <div class="cart-line-name">${item.name}</div>
            <div class="cart-line-sub">Qty: ${item.qty} × ₹${item.price.toFixed(2)}</div>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="cart-line-price">₹${(item.price * item.qty).toFixed(2)}</span>
            <button class="cart-line-remove" onclick="removeFromCart(${item.id})">×</button>
          </div>
        </div>`).join('');
      if (totalEl)  totalEl.textContent    = `₹${total.toFixed(2)}`;
      if (totalRow) totalRow.style.display = 'flex';
      if (waBtn)    waBtn.style.display    = 'flex';
    }
  }
}

// ── ADD TO CART ──
function addToCart(id) {
  const product = PRODUCTS.find(p => p.id === id);
  if (!product) return;
  const existing = cart.find(c => c.id === id);
  if (existing) { existing.qty++; }
  else { cart.push({ id, name: product.name, price: product.price, qty: 1 }); }
  saveCart();
  updateCartUI();
  showToast(`✓ "${product.name}" added to cart`);
}

// ── REMOVE FROM CART ──
function removeFromCart(id) {
  cart = cart.filter(c => c.id !== id);
  saveCart();
  updateCartUI();
}

// ── SEND TO WHATSAPP ──
function sendToWhatsApp() {
  if (cart.length === 0) { showToast('🛒 Cart is empty!'); return; }
  const total = cart.reduce((s, i) => s + i.price * i.qty, 0);
  let msg = `🛒 *New Order — Vibrant Digital Printers*\n\n*Items Ordered:*\n`;
  cart.forEach((item, idx) => {
    msg += `${idx + 1}. ${item.name}\n   Qty: ${item.qty} × ₹${item.price.toFixed(2)} = ₹${(item.price * item.qty).toFixed(2)}\n`;
  });
  msg += `\n━━━━━━━━━━━━━━━\n*Total Amount: ₹${total.toFixed(2)}*\n\nPlease confirm my order 🙏`;
  window.open(`https://wa.me/${WHATSAPP_NUMBER}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ── TOAST ──
let toastTimer;
function showToast(msg) {
  const toast = document.getElementById('toast');
  if (!toast) return;
  clearTimeout(toastTimer);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimer = setTimeout(() => toast.classList.remove('show'), 3000);
}

// ── BADGE CLASS ──
function getBadgeClass(badge) {
  if (!badge) return '';
  return { New:'badge-new', Bestseller:'badge-bestseller', Sale:'badge-sale',
           Premium:'badge-bestseller', Popular:'badge-new' }[badge] || 'badge-new';
}

// ── RENDER PRODUCTS ──
function renderProducts() {
  const grid = document.getElementById('productsGrid');
  if (!grid) return;
  grid.innerHTML = PRODUCTS.map(p => `
    <div class="product-card" data-id="${p.id}">
      <div class="product-img-wrap">
        <div class="product-img-placeholder">
          ${p.cardSvg}
        </div>
        ${p.badge ? `<span class="product-badge ${getBadgeClass(p.badge)}">${p.badge}</span>` : ''}
        <button class="product-wishlist" aria-label="Wishlist" data-id="${p.id}">♡</button>
      </div>
      <div class="product-info">
        <h3 class="product-name">${p.name}</h3>
        <p class="product-price">₹ ${p.price.toFixed(2)}</p>
      </div>
      <button class="product-quick-add btn-add" data-id="${p.id}" onclick="addToCart(${p.id})">
        Add to Cart
      </button>
    </div>
  `).join('');
}
